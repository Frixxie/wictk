[package]
name = "backend"
version = "0.20.1"
edition = "2021"
homepage = "https://github.com/Frixxie/wictk"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.99"
axum = { version = "0.8.4", features = ["json", "macros"] }
chrono = { version = "0.4.41", features = ["serde"] }
geo = { version = "0.30.0", features = ["serde", "use-serde"] }
metrics = "0.24.2"
metrics-exporter-prometheus = "0.17.2"
moka = { version = "0.12.10", features = ["future"] }
redact = { version = "0.1.11", features = ["serde"] }
reqwest = { version = "0.12.23", features = ["json"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.143"
structopt = "0.3.26"
tokio = { version = "1.47.1", features = ["full", "tracing"] }
tower = { version = "0.5.2", features = ["full", "tracing"] }
tower-http = "0.6.6"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["json"] }
wictk_core = {path = "../wictk_core"}

[dev-dependencies]
pretty_assertions = "1.4.1"
tokio-test = "0.4.4"
tower = { version = "0.5.2", features = ["util"] }
http-body-util = "0.1.3"
once_cell = "1.21.3"
