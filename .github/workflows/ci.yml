name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build workspace
    runs-on: arc-frixxie-runner
    container:
      image: rust:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust versions
        run: rustc --version && cargo --version

      - name: Build workspace
        run: cargo build --workspace --verbose

  test:
    name: Test workspace
    needs: build
    runs-on: arc-frixxie-runner
    container:
      image: rust:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust versions
        run: rustc --version && cargo --version

      - name: Run tests
        run: cargo test --workspace --verbose

  deploy-backend:
    name: Deploy backend image
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}/backend"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}

  deploy-client-logger:
    name: Deploy client logger image
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}/client_logger"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client_logger
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}

  deploy-notifier:
    name: Deploy notifier image
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}/notifier"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.notifier
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
